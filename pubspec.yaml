name: polymorphism
description: "A Flutter Web portfolio showcasing the identity of an Ultimate Polymorphism — a visionary who balances engineering, art, and design."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  meta: ^1.15.0
  google_fonts: ^6.1.0
  visibility_detector: ^0.4.0
  auto_size_text: ^3.0.0
  intl: ^0.19.0
  lucide_icons_flutter: ^3.0.6
  http: ^1.2.2
  flutter_web_scroll: ^1.0.1
  go_router: ^17.3.0
  flutter_animate: ^4.5.2
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  assets: 
    - assets/images/
    - assets/images/works/
  uses-material-design: true