name: polymorphism
description: "A Flutter Web portfolio showcasing the identity of an Ultimate Polymorphism — a visionary who balances engineering, art, and design."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  # Tree-shaken to a few bytes; kept because go_router's adaptive (Cupertino)
  # page path references CupertinoIcons — without it the build warns and that
  # glyph would render as tofu.
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  google_fonts: ^6.1.0
  visibility_detector: ^0.4.0
  lucide_icons_flutter: ^3.0.6
  http: ^1.2.2
  flutter_web_scroll: ^1.0.1
  go_router: ^17.3.0
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# Pinned to a vendored, patched copy of lucide_icons_flutter 3.1.10 — the last
# release with the github/figma/linkedin brand glyphs, patched so it compiles
# against Flutter SDKs where IconData is a final class (upstream's
# `LucideIconData extends IconData` was rewritten to plain `const IconData(...)`).
dependency_overrides:
  lucide_icons_flutter:
    path: third_party/lucide_icons_flutter

flutter:
  assets:
    - assets/images/
    - assets/fonts/
    - assets/works/_gallery/roast/
    - assets/works/_gallery/fe-teller/
    - assets/works/_gallery/elssa/
    - assets/works/_gallery/profund/
    - assets/works/_gallery/sigap/
    - assets/works/_gallery/balai/
    - assets/works/_gallery/fitx/
  uses-material-design: true