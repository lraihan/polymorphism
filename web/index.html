<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Raihan — Flutter & Visual Engineer based in Jakarta. Building things that feel alive: banking platforms, emergency-response tools, and interfaces with intention.">
  <meta name="keywords" content="portfolio, flutter, developer, visual engineer, ui engineer, jakarta, design, web development">
  <meta name="author" content="Raihan Fadli">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Raihan — Flutter & Visual Engineer">
  <meta property="og:description" content="Building things that feel alive. Portfolio of Raihan Fadli — Flutter & Visual Engineer, Jakarta.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="Raihan — Flutter & Visual Engineer">
  <meta property="twitter:description" content="Building things that feel alive. Portfolio of Raihan Fadli — Flutter & Visual Engineer, Jakarta.">
  <meta property="twitter:image" content="icons/Icon-512.png">

  <!-- Theme colors — Deep Space -->
  <meta name="theme-color" content="#080810">
  <meta name="msapplication-TileColor" content="#080810">
  <meta name="msapplication-config" content="browserconfig.xml">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Raihan">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="shortcut icon" href="favicon.svg">

  <!-- Fonts are bundled and loaded locally (google_fonts runtime fetching is
       disabled), so no gstatic preconnect is needed — text paints with the app. -->
  <title>Raihan — Flutter & Visual Engineer</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Deep-space backdrop before the engine boots — no white flash. */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #080810;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
