  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

gap:10px;\"><div><div style=\"font:700 13px 'Montserrat';color:#1A1416;\">Jl. Asia Afrika No. 8, lt. 2<\u002Fdiv><div style=\"font:500 11px 'Montserrat';color:#6E6660;\">Patokan: seberang Gedung Merdeka<\u002Fdiv><\u002Fdiv><button style=\"width:40px;height:40px;border-radius:10px;border:1.5px solid #178A5A;background:#E2F2EA;color:#0F6B45;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;\"><i data-lucide=\"phone\" width=\"17\" height=\"17\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:13px;font:700 10px 'Montserrat';\">\n                <span style=\"display:flex;align-items:center;gap:4px;color:#0F6B45;\"><i data-lucide=\"check-circle-2\" width=\"14\" height=\"14\"><\u002Fi> Berangkat<\u002Fspan>\n                <span style=\"flex:1;height:2px;background:#178A5A;\"><\u002Fspan>\n                <span style=\"color:{{ tibaStepColor }};\">Menuju lokasi<\u002Fspan>\n                <span style=\"flex:1;height:2px;background:#E0D7CF;\"><\u002Fspan>\n                <span style=\"color:#B3A99F;\">Selesai<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ rShowTiba }}\" hint-placeholder-val=\"{{ true }}\">\n                <div>\n                  <button onclick=\"{{ arrive }}\" class=\"hintRing\" style=\"width:100%;height:74px;border:none;border-radius:17px;background:#178A5A;color:#fff;font:800 22px 'Montserrat';cursor:pointer;display:flex;align-items:center;justify-content:center;gap:11px;box-shadow:0 8px 22px rgba(23,138,90,.35);\"><i data-lucide=\"map-pin-check\" width=\"28\" height=\"28\"><\u002Fi> TIBA DI LOKASI<\u002Fbutton>\n                  <div style=\"text-align:center;font:600 10px 'Montserrat';color:#9A8E88;margin-top:9px;\">Menandai tiba akan <strong style=\"color:#0F6B45;\">menghentikan jam SPM<\u002Fstrong><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ rShowSelesai }}\" hint-placeholder-val=\"{{ false }}\">\n                <div>\n                  <div style=\"display:flex;align-items:center;gap:8px;background:#E2F2EA;border:1px solid #B6DEC9;border-radius:12px;padding:11px 13px;margin-bottom:11px;\"><i data-lucide=\"lock\" width=\"16\" height=\"16\" style=\"color:#0F6B45;\"><\u002Fi><div style=\"font:600 11px/1.4 'Montserrat';color:#236B4F;\">Jam SPM berhenti pada <span data-clock-mmss=\"\" style=\"font-family:'JetBrains Mono';font-weight:700;\">0:00<\u002Fspan> — dalam target.<\u002Fdiv><\u002Fdiv>\n                  <button onclick=\"{{ resolve }}\" class=\"hintRing\" style=\"width:100%;height:62px;border:none;border-radius:15px;background:#4F1318;color:#fff;font:800 17px 'Montserrat';cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;\"><i data-lucide=\"check\" width=\"22\" height=\"22\"><\u002Fi> SELESAI<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:880,&quot;height&quot;:920}}\">\nclass Component extends DCLogic {\n  state = { stage: 'idle' };\n\n  componentDidMount(){\n    this.elapsed = 0; this.holdPct = 0;\n    this._timer = setInterval(() => { if (this._running()){ this.elapsed++; this._updateClock(); } }, 1000);\n    this._refreshIcons(); this._updateClock();\n  }\n  componentWillUnmount(){\n    if (this._timer) clearInterval(this._timer);\n    if (this._hold) clearInterval(this._hold);\n    if (this._auto) clearTimeout(this._auto);\n    this._navCancel();\n  }\n  componentDidUpdate(prev){\n    if (prev.stage !== this.state.stage){ this._refreshIcons(); this._updateClock(); this._autoAdvance(this.state.stage); this._navOnStage(this.state.stage); }\n  }\n\n  _running(){ return ['diterima','dikerahkan','menuju'].includes(this.state.stage); }\n\n  // mobile: the posko's assignment is simulated automatically after a report is received\n  _autoAdvance(stage){\n    if (this._auto){ clearTimeout(this._auto); this._auto = null; }\n    if (stage === 'diterima'){ this._auto = setTimeout(() => { if (this.state.stage === 'diterima') this.setState({ stage: 'dikerahkan' }); }, 2800); }\n  }\n\n  _refreshIcons(){ let n=0; const go=()=>{ if(window.lucide&&window.lucide.createIcons){try{window.lucide.createIcons();}catch(e){} return;} if(n++<40) setTimeout(go,80);}; go(); }\n  _fmt(s){ const m=Math.floor(s/60); const ss=s%60; return m+':'+String(ss).padStart(2,'0'); }\n  _clockColors(){ const e=this.elapsed; if(e>=840) return {ring:'#FF3B2E',text:'#D11D10'}; if(e>=600) return {ring:'#F4A012',text:'#C97C06'}; return {ring:'#178A5A',text:'#1A1416'}; }\n\n  _updateClock(){\n    const show = this.state.stage !== 'idle';\n    const txt = show ? this._fmt(this.elapsed) : '0:00';\n    const circ = 314.16, pct = Math.min(this.elapsed/900,1), off = show ? circ*(1-pct) : circ;\n    const col = this._clockColors();\n    document.querySelectorAll('[data-clock-mmss]').forEach(el => { el.textContent = txt; });\n    document.querySelectorAll('[data-clock-chip]').forEach(el => { el.textContent = txt; });\n    document.querySelectorAll('[data-clock-text]').forEach(el => { el.setAttribute('fill', show ? col.text : '#1A1416'); });\n    document.querySelectorAll('[data-clock-ring]').forEach(el => { el.setAttribute('stroke-dashoffset', off); el.setAttribute('stroke', show ? col.ring : '#34D399'); });\n  }\n\n  _updateHold(){\n    const circ = 691.1, off = circ*(1-this.holdPct);\n    document.querySelectorAll('[data-hold-ring]').forEach(el => el.setAttribute('stroke-dashoffset', off));\n    document.querySelectorAll('[data-hold-label]').forEach(el => { el.textContent = this.holdPct > 0.02 ? 'menahan…' : 'tekan & tahan'; });\n  }\n\n  onHoldStart = () => {\n    if (this.state.stage !== 'idle') return;\n    this._holdStart = Date.now(); this.holdPct = 0; const HOLD_MS = 1300;\n    if (this._hold) clearInterval(this._hold);\n    this._hold = setInterval(() => {\n      this.holdPct = Math.min((Date.now()-this._holdStart)/HOLD_MS, 1);\n      this._updateHold();\n      if (this.holdPct >= 1){ clearInterval(this._hold); this._hold = null; this._fire(); }\n    }, 30);\n  };\n  onHoldEnd = () => { if (this._hold){ clearInterval(this._hold); this._hold = null; } this.holdPct = 0; this._updateHold(); };\n  _fire = () => { this.elapsed = 0; this.holdPct = 0; this.setState({ stage: 'diterima' }); };\n\n  // --- live navigation: drive the unit along the actual street route ---\n  _navCancel(){\n    if (this._navRaf){ cancelAnimationFrame(this._navRaf); this._navRaf = null; }\n    if (this._navTimer){ clearInterval(this._navTimer); this._navTimer = null; }\n  }\n  _navApply(p){\n    this._navP = p;\n    document.querySelectorAll('[data-nav-path]').forEach(path => {\n      const key = path.getAttribute('data-nav-path');\n      const L = path.getTotalLength();\n      const pt = path.getPointAtLength(L * p);\n      const a = path.getPointAtLength(Math.min(L, L * p + 3));\n      const b = path.getPointAtLength(Math.max(0, L * p - 3));\n      const ang = Math.atan2(a.y - b.y, a.x - b.x) * 180 / Math.PI;\n      const unit = document.querySelector('[data-nav-unit=\"' + key + '\"]');\n      if (unit){\n        const w = unit.offsetWidth || 34, h = unit.offsetHeight || 34;\n        unit.style.left = (pt.x - w / 2) + 'px';\n        unit.style.top = (pt.y - h / 2) + 'px';\n        const rot = unit.querySelector('[data-nav-rot]');\n        if (rot) rot.style.transform = 'rotate(' + (ang + 90) + 'deg)';\n        const drv = this.state.stage === 'menuju';\n        unit.querySelectorAll('[data-nav-icon]').forEach(ic => { ic.style.display = ((ic.getAttribute('data-nav-icon') === 'arrow') === drv) ? '' : 'none'; });\n      }\n      const trail = document.querySelector('[data-nav-trail=\"' + key + '\"]');\n      if (trail){ trail.style.strokeDasharray = L + ' ' + L; trail.style.strokeDashoffset = String(L * (1 - p)); }\n    });\n    const mins = Math.max(1, Math.ceil((1 - p) * 4));\n    document.querySelectorAll('[data-nav-eta]').forEach(el => { el.textContent = p >= 1 ? 'Tiba' : 'ETA ' + mins + ' mnt'; });\n  }\n  _navDrive(from, to, dur, done){\n    this._navCancel();\n    const t0 = performance.now();\n    let finished = false;\n    const tick = () => {\n      if (finished) return;\n      const k = Math.min((performance.now() - t0) / dur, 1);\n      this._navApply(from + (to - from) * k);\n      if (k >= 1){ finished = true; this._navCancel(); if (done) done(); }\n    };\n    const loop = () => { tick(); if (!finished) this._navRaf = requestAnimationFrame(loop); };\n    this._navRaf = requestAnimationFrame(loop);\n    this._navTimer = setInterval(tick, 350);\n  }\n  _navOnStage(stage){\n    if (stage === 'dikerahkan'){ this._navCancel(); setTimeout(() => this._navApply(0), 60); }\n    else if (stage === 'menuju'){ this._navDrive(0, 1, 9000); }\n    else if (stage === 'tiba'){ if ((this._navP || 0) < 1) this._navDrive(this._navP || 0, 1, 450); else this._navApply(1); }\n    else { this._navCancel(); }\n  }\n\n  go = (stage) => () => this.setState({ stage });\n  reset = () => { if (this._auto){ clearTimeout(this._auto); this._auto = null; } this.elapsed = 0; this.holdPct = 0; this.setState({ stage: 'idle' }); };\n\n  renderVals(){\n    const stage = this.state.stage;\n    const order = ['diterima','dikerahkan','menuju','tiba','selesai'];\n    const labels = { diterima:'Diterima', dikerahkan:'Dikerahkan', menuju:'Menuju lokasi', tiba:'Tiba di lokasi', selesai:'Selesai' };\n    const cur = order.indexOf(stage);\n    const steps = order.map((k, i) => {\n      const active = i === cur, done = cur > i;\n      let bg='#5E2026', color='#C99089', border='rgba(255,255,255,.12)', dot='#9A6A66';\n      if (active){ bg='#FF3B2E'; color='#fff'; border='#FF6A5C'; dot='#fff'; }\n      else if (done){ bg='rgba(23,138,90,.22)'; color='#9FE3C2'; border='rgba(23,138,90,.4)'; dot='#34D399'; }\n      return { label: labels[k], bg, color, border, dot };\n    });\n    const pill = {\n      diterima:{label:'Diterima',bg:'#FDF1DC',color:'#8A5A05',dot:'#F4A012'},\n      dikerahkan:{label:'Dikerahkan',bg:'#F3E3E1',color:'#4F1318',dot:'#7A1E24'},\n      menuju:{label:'Menuju lokasi',bg:'#F3E3E1',color:'#4F1318',dot:'#7A1E24'},\n      tiba:{label:'Tiba di lokasi',bg:'#E2F2EA',color:'#0F6B45',dot:'#178A5A'},\n      selesai:{label:'Selesai',bg:'#178A5A',color:'#ffffff',dot:'#ffffff'},\n    }[stage] || {label:'—',bg:'#F0EBE5',color:'#6E6660',dot:'#B3A99F'};\n    const unitShow = ['dikerahkan','menuju','tiba','selesai'].includes(stage) ? 'block' : 'none';\n    const eta = { diterima:'menunggu', dikerahkan:'ETA 5 mnt', menuju:'ETA 3 mnt', tiba:'Tiba', selesai:'Selesai' }[stage] || '—';\n    const guide = {\n      idle:       { t:'Mulai dari Warga.', x:'Tekan & tahan tombol DARURAT (±1 detik) untuk mengirim laporan.' },\n      diterima:   { t:'Laporan terkirim ke Posko.', x:'Jam tanggap berjalan — Posko sedang menugaskan unit terdekat…' },\n      dikerahkan: { t:'Unit ditugaskan.', x:'Di aplikasi Petugas, alarm masuk — tekan \"TERIMA\" untuk berangkat.' },\n      menuju:     { t:'Petugas menuju lokasi.', x:'Unit melaju menyusuri rute di peta. Saat tiba, tekan \"TIBA DI LOKASI\" — ini menghentikan jam SPM.' },\n      tiba:       { t:'Tiba di lokasi — jam SPM berhenti.', x:'Setelah penanganan, tekan \"SELESAI\" di aplikasi Petugas.' },\n      selesai:    { t:'Insiden selesai.', x:'Warga melihat konfirmasi & waktu tanggap. Klik \"Ulangi\" untuk mengulang.' },\n    }[stage];\n    return {\n      steps, reset: this.reset, onHoldStart: this.onHoldStart, onHoldEnd: this.onHoldEnd,\n      accept: this.go('menuju'), arrive: this.go('tiba'), resolve: this.go('selesai'),\n      guideTitle: guide.t, guideText: guide.x,\n      cHome: stage==='idle',\n      cTracking: ['diterima','dikerahkan','menuju','tiba'].includes(stage),\n      cResolved: stage==='selesai',\n      tMin: ({ diterima:5, dikerahkan:6, menuju:7, tiba:9 }[stage]) || 5,\n      statusLabel: pill.label, statusBg: pill.bg, statusColor: pill.color, statusDot: pill.dot,\n      unitShow, etaText: eta, finalTime: this._fmt(this.elapsed),\n      navDriving: stage==='menuju', navParked: stage!=='menuju',\n      standbyMsg: stage==='diterima' ? 'Penugasan masuk sebentar lagi…' : 'Menunggu penugasan',\n      rStandby: ['idle','diterima','selesai'].includes(stage),\n      rIncoming: stage==='dikerahkan',\n      rActive: ['menuju','tiba'].includes(stage),\n      rShowTiba: stage==='menuju',\n      rShowSelesai: stage==='tiba',\n      tibaStepColor: (stage==='tiba'||stage==='selesai') ? '#0F6B45' : '#C97C06',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
